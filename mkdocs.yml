site_name: PVE Documentation
site_description: PVE 文档
site_url: https://pve.doc.butubb.cn

repo_name: 8butubb/pve_doc
repo_url: https://github.com/8butubb/pve_doc

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md

plugins:
  - search
