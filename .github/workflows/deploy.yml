name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install mkdocs-material mkdocs-git-revision-date-localized-plugin
      - name: Set build info
        id: build-info
        run: |
          BUILD_DATE=$(date -u +'%Y-%m-%d %H:%M:%S')
          BUILD_COMMIT=${GITHUB_SHA::8}
          echo "build_date=${BUILD_DATE}" >> $GITHUB_OUTPUT
          echo "build_commit=${BUILD_COMMIT}" >> $GITHUB_OUTPUT
          echo "build_info=构建时间: ${BUILD_DATE} | Commit: ${BUILD_COMMIT}" >> $GITHUB_OUTPUT
      - name: Update mkdocs.yml with build info
        run: |
          sed -i 's|build_info:.*|build_info: "${{ steps.build-info.outputs.build_info }}"|' mkdocs.yml
      - run: mkdocs build -t material
      - id: deployment
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deploy
        uses: actions/deploy-pages@v4
